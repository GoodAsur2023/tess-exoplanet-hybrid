# ── Paths ──────────────────────────────────────────────────────────────────
paths:
  raw_csv: "/content/drive/MyDrive/TESS_Project/data/raw/tess2018206190142-s0001-s0013_dvr-tcestats.csv"
  processed_dir: "/content/drive/MyDrive/TESS_Project/data/processed"
  checkpoint_dir: "/content/drive/MyDrive/TESS_Project/checkpoints"

# ── Data / Preprocessing ───────────────────────────────────────────────────
data:
  snr_threshold: 10.0          
  min_transits: 2              
  global_view_length: 2048     
  local_view_length: 201       
  local_view_fraction: 0.15    
  val_fraction: 0.15
  test_fraction: 0.15
  seed: 42

# ── Model ──────────────────────────────────────────────────────────────────
model:
  cnn_channels: [32, 64, 128]
  cnn_kernel_size: 5
  cnn_dropout: 0.1
  d_model: 256
  nhead: 8
  num_transformer_layers: 2
  dim_feedforward: 512
  transformer_dropout: 0.1
  classifier_dropout: 0.3

# ── Training ───────────────────────────────────────────────────────────────
training:
  epochs: 80
  batch_size: 64
  learning_rate: 1.0e-4        
  weight_decay: 1.0e-4
  focal_alpha: 0.65            
  focal_gamma: 1.5             
  lr_scheduler: "cosine"
  warmup_epochs: 5
  patience: 15
  grad_clip: 1.0

# ── Logging ────────────────────────────────────────────────────────────────
logging:
  use_wandb: true
  wandb_project: "tess-exoplanet-hybrid"        
  log_interval: 10